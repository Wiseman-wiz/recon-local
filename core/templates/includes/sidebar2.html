  <!-- Main Sidebar Container -->
  <aside class="main-sidebar sidebar-dark-success elevation-4">
    <!-- Brand Logo -->
    <!-- <a href="/" class="brand-link">
      <img src="/static/assets/images/logo.svg" alt="BDC Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
      <span class="brand-text font-weight-light">Systems</span>
    </a> -->
    <a href="/" class="brand-link logo-switch">
      <img src="/static/assets/img/logo-mini.svg" alt="BDC Systems Logo Small" class="brand-image-xl logo-xs">
      <img src="/static/assets/img/logo.svg" alt="BDC Systems Logo" class="brand-image-xs logo-xl" style="left: 12px">
    </a>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Sidebar user panel (optional) -->
      <div class="user-panel mt-3 pb-3 mb-3 d-flex">
        <div class="image">
          <img src="/static/assets/img/default_user_avatar.png" class="img-circle elevation-2" alt="User Image">
        </div>
        <div class="info">
          <span class="d-block text-white text-muted">
            {{ request.user.username }}
          </span>
          <span class="d-block text-white text-muted">
            {{ request.user.email }}
          </span>
          <span class="d-block text-white text-muted">
            {{ company_code }}
          </span>
        </div>
      </div>

      <!-- Sidebar Menu -->
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column nav-child-indent" data-widget="treeview" role="menu" data-accordion="false">
          <li class="nav-item">
            <a href="{% url 'home2' %}" class="nav-link">
              <i class="nav-icon fas fa-cube"></i>
              <p>
                Dashboard
              </p>
            </a>
          </li>
          
        </ul>
      </nav>
      <div class="fixed-bottom d-none">
        <button type="button" class="btn btn-dark btn-sm" data-toggle="modal" data-target="#devModal">
          <i class="fas fa-code"></i>
        </button>
      </div>
      <!-- /.sidebar-menu -->
    </div>
    <!-- /.sidebar -->
  </aside>
  <div class="modal fade" id="devModal" tabindex="-1" aria-labelledby="devModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="devModalLabel">DEV SPACE</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <form action="{% url 'dev_mod_add_note' %}" method="post">
          {% csrf_token %}
          <input type="hidden" name="redirect_path" value="{{ request.path }}">
          <div class="modal-body">
            <a class="btn btn-dark mb-2" href="{% url 'dev_mod_export_note' filename='dev_notes' %}" target="_blank" rel="noopener noreferrer"><i class="far fa-file-code fa-lg"></i></a>
            <div class="form-group">
              <textarea id="codeMirrorInit" class="form-control" name="dev_note" rows="7" name="dev_task"># Write your codes here...</textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-danger btn-sm" data-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-outline-success btn-sm">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>
