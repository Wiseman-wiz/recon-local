<table class="table table-hover table-striped">
    <thead>
      <tr>
        <th>_id</th>
        <th>subaccount</th>
        <th>account_number</th>
      </tr>
    </thead>
    <tbody>
      {% for item in accounts %}
        <tr>
          <td><a href="{{ item.id }}">{{ item.id }}</a></td>
          <td>{{ item.subaccount }}</td>
          <td>{{ item.account_number }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
